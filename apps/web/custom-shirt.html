<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICTO — Customizer Atelier</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Hanken+Grotesk:wght@400;500;600&family=Alex+Brush&family=Cinzel:wght@600;700&family=Courier+Prime&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#1c1b1b', // Obsidian Deep Black
              secondary: '#D4AF37', // Atelier Gold
              'on-primary': '#ffffff',
              surface: '#fbf9f9', // Soft Alabaster
              'on-surface': '#1c1b1b',
              'on-surface-variant': '#444748',
              'surface-container': '#f0eeee',
              'surface-container-low': '#f5f3f3',
              'surface-container-lowest': '#ffffff',
              'surface-container-high': '#e6e4e4',
              'surface-container-highest': '#dad8d8',
              outline: '#747778',
              'outline-variant': '#c4c7c7'
            },
            spacing: {
              'margin-desktop': '80px',
              'margin-mobile': '20px',
              'container-max': '1440px'
            },
            fontFamily: {
              'display-lg': ['Playfair Display'],
              'display-lg-mobile': ['Playfair Display'],
              'body-md': ['Hanken Grotesk'],
              'headline-md': ['Playfair Display'],
              'label-md': ['Hanken Grotesk'],
              'label-sm': ['Hanken Grotesk'],
              'body-lg': ['Hanken Grotesk'],
              'headline-sm': ['Playfair Display']
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #fbf9f9;
        }
        .canvas-area {
            position: absolute;
            background: transparent;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        /* Responsive Fabric.js Canvas Container Override */
        .canvas-container,
        .canvas-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .obsidian-btn {
            background: #1c1b1b;
            color: #ffffff;
            transition: all 0.3s ease;
            border: 1px solid #1c1b1b;
        }
        .obsidian-btn:hover {
            background: transparent;
            color: #1c1b1b;
        }
        .gold-btn {
            background: #D4AF37;
            color: #1c1b1b;
            transition: all 0.3s ease;
            border: 1px solid #D4AF37;
        }
        .gold-btn:hover {
            background: transparent;
            color: #D4AF37;
        }
        .swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .swatch.active {
            outline: 2px solid #D4AF37;
            outline-offset: 2px;
        }
        .text-colors-grid .swatch {
            width: 24px;
            height: 24px;
        }
        .text-colors-grid .swatch.active {
            outline: 2px solid #D4AF37;
            outline-offset: 1px;
        }
        .font-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .font-card {
            padding: 10px 6px;
            border: 1px solid #c4c7c7;
            font-size: 11px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }
        .font-card.active {
            border-color: #000000;
            background-color: #e4e2e2;
            font-weight: bold;
        }
        .size-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .size-chip {
            padding: 8px 0;
            border: 1px solid #c4c7c7;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            font-weight: 500;
        }
        .size-chip.active {
            border-color: #000000;
            background-color: #e4e2e2;
            font-weight: bold;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #c4c7c7;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: #444748;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .tab.active {
            color: #000000;
            border-bottom-color: #D4AF37;
        }

        /* Floating Controls Toolbar */
        .delem-toolbar {
            position: absolute;
            top: -46px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            padding: 3px;
            background: #1c1b1b;
            border: 1px solid #D4AF37;
            border-radius: 4px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.35);
            pointer-events: auto;
        }
        .delem-toolbar button {
            width: 28px;
            height: 28px;
            background: transparent;
            border: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .delem-toolbar button:hover {
            background: rgba(255,255,255,0.15);
            color: #D4AF37;
        }
        .delem-toolbar button.delete-btn:hover {
            background: rgba(186,26,26,0.2);
            color: #ffdad6;
        }
        
        /* Snapping alignment guides */
        .snap-guide {
            position: absolute;
            background-color: #D4AF37;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            transition: opacity 0.15s ease;
            box-shadow: 0 0 4px rgba(212,175,55,0.5);
        }

        /* Layer List Draggability styling */
        .layer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #f5f3f3;
            border: 1px solid #c4c7c7;
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
        }
        .layer-row:hover {
            border-color: #000;
        }
        .layer-row.selected {
            border-color: #D4AF37;
            background-color: rgba(212,175,55,0.05);
            box-shadow: 0 2px 8px rgba(212,175,55,0.1);
        }
        .layer-row.dragging {
            opacity: 0.4;
            border: 1px dashed #D4AF37;
        }
        .layer-thumb {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e4e2e2;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .layer-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .layer-name {
            flex-grow: 1;
            margin-left: 8px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .layer-del {
            color: #ba1a1a;
            cursor: pointer;
            padding: 2px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .layer-del:hover {
            background: rgba(186,26,26,0.1);
        }

        /* Pulsing indicator for printable area when empty */
        .print-area.is-empty .print-hint {
            animation: pulse-border 2s infinite ease-in-out;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(212,175,55,0.3); }
            50% { border-color: rgba(212,175,55,0.8); }
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface overflow-x-hidden">
    <!-- Vue 3 App Mount Shell Container -->
    <div id="app"></div>

    <!-- CDNs and App Controller -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/custom-shirt.js?v=6.1"></script>
</body>
</html>
