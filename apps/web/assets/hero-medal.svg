<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="medal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#ff00aa"/>
    </linearGradient>
  </defs>
  <!-- Ribbon left -->
  <path d="M70 10 L55 70 L80 60 L85 10" fill="url(#ribbon)"/>
  <!-- Ribbon right -->
  <path d="M130 10 L145 70 L120 60 L115 10" fill="url(#ribbon)"/>
  <!-- Medal circle -->
  <circle cx="100" cy="110" r="55" fill="url(#medal)" stroke="#fff" stroke-width="3"/>
  <circle cx="100" cy="110" r="45" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <!-- Star in medal -->
  <polygon points="100,75 108,95 130,98 114,113 118,135 100,125 82,135 86,113 70,98 92,95" fill="#fff"/>
  <!-- Sparkles -->
  <circle cx="50" cy="25" r="4" fill="#fdcb6e"/>
  <circle cx="160" cy="20" r="3" fill="#fdcb6e"/>
  <circle cx="45" cy="160" r="3" fill="#fdcb6e" opacity="0.7"/>
</svg>